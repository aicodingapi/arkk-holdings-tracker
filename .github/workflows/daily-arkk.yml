name: Daily ARKK Holdings Download

on:
  schedule:
    - cron: '30 13 * * *'
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6      # Updated
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python 3.11.5
      uses: actions/setup-python@v6   # Updated to v6 (Node 24 ready)
      with:
        python-version: '3.11.5'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    # === Playwright Caching ===
    - name: Cache Playwright Browsers
      uses: actions/cache@v5          # Updated to v5
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}
    
    - name: Install Playwright Chromium
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: playwright install --with-deps chromium
    
    - name: Install Playwright System Dependencies
      run: playwright install-deps chromium
    
    - name: Run dl_arkk.py
      run: python dl_arkk.py
    
    - name: Commit and push updated files
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add "data_arkk/*.csv" "**/*.csv"   # Updated path to match your folder
        git commit -m "Daily ARKK update: $(date -u)" || echo "No changes to commit"
        git push
