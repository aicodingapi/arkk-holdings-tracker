name: Daily ARKK Holdings Download

on:
  schedule:
    - cron: '0 12 * * *'   # Runs at 20:00 HKT daily (12:00 UTC)
  workflow_dispatch:       # Allows manual trigger from GitHub UI

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python 3.11.5
      uses: actions/setup-python@v5
      with:
        python-version: '3.11.5'   # Exact version you want
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Install Playwright Browsers & Dependencies
      run: |
        playwright install --with-deps chromium   # Only Chromium + system deps
    
    - name: Run dl_arkk.py
      run: python dl_arkk.py
    
    - name: Commit and push updated files
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add "*.csv" "**/*.csv"   # Adjust if your files are in subfolders
        git commit -m "Daily ARKK update: $(date -u)" || echo "No changes to commit"
        git push